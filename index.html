<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Found Me!</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      overflow: hidden;
    }

    #player {
      max-width: 800px;
      margin: 40px auto;
      aspect-ratio: 16/9;
    }

    /* FULLSCREEN OVERLAY */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }

    #overlay button {
      padding: 20px 40px;
      font-size: 20px;
      background: #ff0000;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    #overlay h1 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<!-- Overlay -->
<div id="overlay">
  <h1>⚠️ Click to Continue</h1>
  <button onclick="startRickroll()">Continue</button>
</div>

<h1>You got rickrolled 😂</h1>
<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
  let player;
  const webhookURL = "YOUR_WEBHOOK_HERE";

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: 'dQw4w9WgXcQ',
      playerVars: {
        controls: 0,
        loop: 1,
        playlist: 'dQw4w9WgXcQ'
      }
    });
  }

  function startRickroll() {
    // Hide overlay
    document.getElementById("overlay").style.display = "none";

    // Play WITH SOUND (now allowed)
    if (player) {
      player.unMute();
      player.playVideo();
    }

    sendPageVisit();
  }

  async function sendPageVisit() {
    try {
      await fetch(webhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: "🎉 Someone fell for the click trap!"
        })
      });
    } catch (e) {}
  }
</script>

</body>
</html>
