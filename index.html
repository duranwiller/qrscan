<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You Found Me!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      padding: 20px;
    }
    .video-container {
      margin: 20px auto;
      width: 80%;
      max-width: 560px;
    }
    iframe {
      width: 100%;
      height: 315px;
      border: none;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Welcome 👀</h1>
  
  <div class="video-container">
    <iframe
      id="video"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1"
      title="YouTube video"
      allow="autoplay"
      allowfullscreen>
    </iframe>
  </div>

  <p>(Optional) Would you like to enter your name so we know who got rickrolled?</p>
  <input type="text" id="nameInput" placeholder="Your name">
  <button onclick="sendName()">Submit</button>
  <p id="status"></p>

<script>
  const webhookURL = "https://discord.com/api/webhooks/1470223913991802920/MzSJrTFcTKt18ntOlPi0NIYX_YCFws1CnwiukNwajVWahr7cumaPVsXK6YbHYl2k06Dr";

  // ======================
  // AUTO SEND on page load
  // ======================
  async function sendPageVisit() {
    try {
      const response = await fetch(webhookURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: "🎉 **Someone just opened the rickroll page!**",
          embeds: [{
            color: 0xFF0000,
            title: "New Victim 👀",
            description: "A new person loaded the website.",
            timestamp: new Date().toISOString()
          }]
        })
      });

      if (response.ok) {
        console.log("Auto webhook sent successfully");
      }
    } catch (error) {
      console.error("Failed to send auto webhook:", error);
      // Fail silently so the page still works
    }
  }

  // ======================
  // Send name when user submits
  // ======================
  function sendName() {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) {
      document.getElementById("status").innerText = "Please enter a name!";
      return;
    }

    fetch(webhookURL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content: `😂 **${name}** just got rickrolled!`
      })
    })
    .then(() => {
      document.getElementById("status").innerText = "✅ Sent!";
    })
    .catch(() => {
      document.getElementById("status").innerText = "❌ Error sending.";
    });
  }

  // Run the auto-send when the page loads
  window.addEventListener("load", sendPageVisit);

  // Unmute video after first click (bypasses browser restrictions)
  document.body.addEventListener("click", () => {
    const iframe = document.getElementById("video");
    if (iframe.src.includes("mute=1")) {
      iframe.src = iframe.src.replace("mute=1", "mute=0");
    }
  }, { once: true });
</script>
</body>
</html>
