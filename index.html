<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: none;
  }

  button {
    padding: 15px 25px;
    font-size: 18px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    background: #1d4ed8;
  }
</style>
</head>

<body>

<button id="playBtn">Play Video</button>

<video id="vid" playsinline>
  <source src="videoqr.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<script>
const btn = document.getElementById("playBtn");
const video = document.getElementById("vid");

btn.addEventListener("click", async () => {
  btn.style.display = "none";
  video.style.display = "block";

  video.muted = false;

  try {
    await video.play();
  } catch (e) {
    // fallback: browsers may block sound autoplay
    video.muted = true;
    await video.play();
  }
});
</script>

</body>
</html>
