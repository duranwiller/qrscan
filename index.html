<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Found Me!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      padding: 20px;
      margin: 0;
      overflow: hidden;
    }
    .video-container {
      position: relative;
      width: 100%;
      max-width: 640px;
      margin: 20px auto;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    h1 {
      margin: 20px 0;
    }
    input, button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Why'd u scan this Yashas AHAHAH (or whoever got here) 😂</h1>

  <div class="video-container">
    <iframe 
      id="rickroll"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0&loop=1&playlist=dQw4w9WgXcQ"
      title="Rick Astley - Never Gonna Give You Up"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <p>(Optional) Tell us who just got rickrolled:</p>
  <input type="text" id="nameInput" placeholder="Your name or username">
  <button onclick="sendName()">Submit</button>
  <p id="status"></p>

  <script>
    const webhookURL = "https://discord.com/api/webhooks/1470223913991802920/MzSJrTFcTKt18ntOlPi0NIYX_YCFws1CnwiukNwajVWahr7cumaPVsXK6YbHYl2k06Dr";

    // Auto send page visit
    async function sendPageVisit() {
      try {
        await fetch(webhookURL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: "🎉 **New Rickroll Victim!**",
            embeds: [{
              color: 0xFF0000,
              title: "Page Opened",
              description: "Someone just loaded the rickroll page.",
              timestamp: new Date().toISOString()
            }]
          })
        });
      } catch (e) {
        // Fail silently
      }
    }

    function sendName() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) {
        document.getElementById("status").innerText = "Please enter a name!";
        return;
      }

      fetch(webhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: `😂 **${name}** just got absolutely rickrolled!`
        })
      }).then(() => {
        document.getElementById("status").innerText = "✅ Sent to the server!";
      }).catch(() => {
        document.getElementById("status").innerText = "❌ Failed to send.";
      });
    }

    // Try to force play on mobile (best effort)
    function forcePlay() {
      const iframe = document.getElementById("rickroll");
      let src = iframe.src;

      // Remove mute if present
      if (src.includes("mute=1")) {
        src = src.replace("mute=1", "mute=0");
      }
      // Ensure autoplay is on
      if (!src.includes("autoplay=1")) {
        src += (src.includes("?") ? "&" : "?") + "autoplay=1";
      }

      iframe.src = src;
    }

    // Run when page loads
    window.addEventListener("load", () => {
      sendPageVisit();
      
      // Try to autoplay immediately
      setTimeout(forcePlay, 800);

      // Fallback: Play on first user interaction (very important for mobile)
      document.body.addEventListener("touchstart", () => {
        forcePlay();
      }, { once: true });

      document.body.addEventListener("click", () => {
        forcePlay();
      }, { once: true });
    });
  </script>
</body>
</html>
