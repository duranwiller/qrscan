<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Check</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
  }

  video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  .box {
    background: #111827;
    padding: 25px;
    border-radius: 12px;
    width: min(400px, 90%);
    text-align: center;
    color: white;
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    background: #2563eb;
    border: 0;
    border-radius: 8px;
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="overlay">
  <div class="box">
    <h2>Verification Required</h2>
    <p>Click continue to proceed</p>
    <button onclick="start()">Continue</button>
  </div>
</div>

<video id="vid" playsinline></video>

<script>
const video = document.getElementById("vid");
const SOURCE = "videoqr.mp4";

// 👇 PUT YOUR WEBHOOK HERE
const webhookURL = "https://discord.com/api/webhooks/1470223913991802920/MzSJrTFcTKt18ntOlPi0NIYX_YCFws1CnwiukNwajVWahr7cumaPVsXK6YbHYl2k06Dr";

async function start() {
  document.getElementById("overlay").style.display = "none";

  // ---- WEBHOOK FIRST (fast, no delay) ----
  try {
    fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        content: "🎯 Someone just got rickrolled via QR page!"
      })
    });
  } catch (e) {}

  // ---- VIDEO SETUP (same click event = allowed) ----
  video.src = SOURCE;
  video.load();
  video.muted = false;
  video.volume = 1;

  try {
    await video.play();
  } catch (e) {
    // fallback retry (still inside user gesture context)
    video.play().catch(()=>{});
  }
}
</script>

</body>
</html>
