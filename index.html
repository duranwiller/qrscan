<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Content</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: black;
      overflow: hidden;
      color: white;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #overlay {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .card h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .small {
      font-size: 12px;
      color: #6b7280;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id="overlay">
  <div class="card">
    <h1>Secure Access</h1>
    <p>Please confirm you are not a bot to continue.</p>
    <button class="btn" onclick="start()">Verify & Continue</button>
    <div class="small">Protected by SecureCheck™</div>
  </div>
</div>

<video id="vid" loop playsinline muted>
  <source src="videoqr.mp4" type="video/mp4">
</video>

<script>
const webhookURL = "YOUR_DISCORD_WEBHOOK_HERE";

function start() {
  const v = document.getElementById("vid");

  // Hide overlay
  document.getElementById("overlay").style.display = "none";

  // Play video with sound
  v.muted = false;
  v.volume = 1;
  v.play();

  // Fullscreen 😈
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();

  // Send webhook
  sendWebhook();
}

async function sendWebhook() {
  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        content: "🎉 Someone just got rickrolled via your QR site!"
      })
    });
  } catch (e) {
    // fail silently
  }
}

// Keep video playing if they switch tabs 😈
document.addEventListener("visibilitychange", () => {
  const v = document.getElementById("vid");
  if (!document.hidden && v.paused) {
    v.play();
  }
});
</script>

</body>
</html>
